<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রকল্প অনুমোদন স্মারক - জেলা পরিষদ, কুষ্টিয়া</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.maateen.me/siyam-rupali/font.css" rel="stylesheet">
    <style>@font-face{font-family:"Shurjo";font-display:swap;font-style:normal;font-weight:400;src:url('https://assets.prothomalo.com/prothomalo/assets/ShurjoWeb_400_v2-6a682f6f610beeda14f0.woff2') format('woff2')}@font-face{font-family:"Shurjo";font-display:swap;font-style:normal;font-weight:700;src:url('https://assets.prothomalo.com/prothomalo/assets/ShurjoWeb_700_v2-ef9e058ccc3a98d85030.woff2') format('woff2')}</style>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="ZPK Admin" />
    <link rel="manifest" href="/favicon/site.webmanifest" />

    <style>
        html { font-size: 18px; }
        * { font-family: Shurjo, "Siyam Rupali", Roboto, Arial, Helvetica, Monospace; }

        .table-row {
            transition: all 0.2s ease;
            border-bottom: 1px solid #f3f4f6;
            background: #ffffff;
        }
        .table-row:last-child { border-bottom: none; }
        .table-row:hover {
            background: #fef9f3;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(245, 158, 11, 0.1);
            transform: translateY(-1px);
        }

        .detail-backdrop {
            opacity: 0; pointer-events: none;
            background: rgba(180,83,9,0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            transition: opacity 0.3s cubic-bezier(.4,0,.2,1);
        }
        .detail-backdrop.open { opacity: 1; pointer-events: auto; }
        .detail-card {
            transform: translateY(24px) scale(0.97);
            opacity: 0;
            transition: transform 0.32s cubic-bezier(.34,1.56,.64,1), opacity 0.28s ease;
        }
        .detail-backdrop.open .detail-card { transform: translateY(0) scale(1); opacity: 1; }

        #form-modal {
            background: rgba(180,83,9,0.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .form-modal-header {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            padding: 1.5rem;
        }

        .form-field { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-field label { font-weight: 600; color: #374151; font-size: 0.95rem; }
        .form-field input, .form-field select {
            border: 1px solid #d1d5db; border-radius: 0.5rem;
            padding: 0.75rem; transition: all 0.2s; background: white;
        }
        .form-field input:focus, .form-field select:focus {
            outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }

        .btn-save {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem;
            border: none; cursor: pointer; font-weight: 600;
            transition: all 0.2s; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(16,185,129,0.2); }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem;
            border: none; cursor: pointer; font-weight: 600;
            transition: all 0.2s; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12); }

        .btn-danger {
            background: #ef4444; color: white; padding: 0.5rem 1rem;
            border-radius: 0.4rem; border: none; cursor: pointer; font-weight: 600;
            font-size: 0.875rem; transition: all 0.2s; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .btn-danger:hover { background: #dc2626; }

        .action-btn {
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.12);
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col min-h-screen">

    <!-- Header -->
    <div id="header-container"></div>

    <!-- Navigation Menu -->
    <div id="menu-container"></div>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8 flex-1">
        <!-- Success/Error Messages -->
        <div id="success-message" class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
            <p id="success-text"></p>
        </div>
        <div id="error-message" class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <p id="error-text"></p>
        </div>

        <!-- Page Header -->
        <div class="bg-white rounded-xl shadow-md p-6 mb-6">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                        <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentcolor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        প্রকল্প অনুমোদন স্মারক
                    </h2>
                    <p class="text-gray-600 text-sm mt-1">জেলা পরিষদ, কুষ্টিয়া</p>
                </div>
                <button onclick="openAddModal()" class="btn-primary flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                    </svg>
                    নতুন স্মারক যোগ করুন
                </button>
            </div>

            <!-- Search and Filter -->
            <div class="flex flex-col sm:flex-row gap-3">
                <input type="text" id="search-input" placeholder="স্মারক নম্বর খুঁজুন..."
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 focus:border-transparent text-gray-900">
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gradient-to-r from-amber-500 to-amber-600 border-b border-amber-600">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-white uppercase tracking-widest">স্মারক তারিখ</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-white uppercase tracking-widest">স্মারক নম্বর</th>
                            <th class="px-6 py-4 text-center text-xs font-bold text-white uppercase tracking-widest">প্রকল্প সংখ্যা</th>
                            <th class="px-6 py-4 text-center text-xs font-bold text-white uppercase tracking-widest">কার্যক্রম</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="4" class="px-6 py-8 text-center text-gray-500">লোড হচ্ছে...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Footer -->
            <div class="px-6 py-4 bg-gradient-to-r from-gray-50 to-gray-100 border-t border-gray-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="text-sm text-gray-700 font-semibold">মোট স্মারক: <span id="total-count" class="text-gray-900 font-bold">0</span></div>
                <div id="pagination-container" class="flex gap-1.5"></div>
            </div>
        </div>
    </main>

    <!-- Detail Modal -->
    <div id="detail-backdrop" class="detail-backdrop fixed inset-0 z-40 flex items-center justify-center p-4" onclick="if(event.target===this)closeDetailModal()">
        <div class="detail-card bg-white rounded-2xl shadow-2xl max-w-md w-full">
            <div class="bg-gradient-to-r from-amber-500 to-amber-600 px-6 py-4 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white">স্মারক বিবরণ</h3>
                <button onclick="closeDetailModal()" class="text-white/80 hover:text-white transition-colors action-btn">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div class="p-6 space-y-4">
                <div>
                    <label class="text-sm font-semibold text-gray-600">স্মারক তারিখ</label>
                    <p id="dm-memo-date" class="text-lg text-gray-900 font-medium mt-1"></p>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-600">স্মারক নম্বর</label>
                    <p id="dm-memo-number" class="text-base text-gray-900 font-mono mt-1"></p>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-600">মোট প্রকল্প সংখ্যা</label>
                    <p id="dm-total-projects" class="text-lg text-gray-900 font-medium mt-1"></p>
                </div>
                <div>
                    <label class="text-sm font-semibold text-gray-600">মন্তব্য</label>
                    <p id="dm-remarks" class="text-gray-700 mt-1"></p>
                </div>
            </div>

            <div class="bg-gray-50 px-6 py-4 border-t border-gray-200 flex gap-3">
                <button onclick="editRecord(currentDetailId)" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold flex items-center justify-center gap-2 action-btn">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    সম্পাদনা
                </button>
                <button onclick="deleteRecord(currentDetailId)" class="btn-danger action-btn">মুছুন</button>
            </div>
        </div>
    </div>

    <!-- Form Modal -->
    <div id="form-modal" class="hidden fixed inset-0 overflow-y-auto h-full w-full z-50">
        <div class="relative top-8 mx-auto p-5 w-full max-w-2xl rounded-2xl mb-10">
            <div class="form-modal-header">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-lg bg-white/20 flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-white leading-tight" id="modal-title">নতুন স্মারক যোগ করুন</h3>
                        <p class="text-amber-200 text-xs font-medium">জেলা পরিষদ, কুষ্টিয়া</p>
                    </div>
                </div>
                <button onclick="closeFormModal()" class="absolute top-6 right-5 w-8 h-8 rounded-lg bg-white/15 hover:bg-white/30 flex items-center justify-center transition-all text-white">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <form id="memo-form" class="bg-white rounded-b-2xl p-6 space-y-4">
                <input type="hidden" id="record-id">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-field md:col-span-1">
                        <label>স্মারক তারিখ <span class="text-red-400 font-bold">*</span></label>
                        <input type="date" name="memo_date" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                    </div>

                    <div class="form-field md:col-span-1">
                        <label>স্মারক নম্বর <span class="text-red-400 font-bold">*</span></label>
                        <input type="text" name="memo_number" required placeholder="যেমন: ০০.০০.৩৩৪.২৫.२६.০০१" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500 font-mono">
                    </div>

                    <div class="form-field md:col-span-1">
                        <label>মোট প্রকল্প সংখ্যা <span class="text-red-400 font-bold">*</span></label>
                        <input type="number" name="total_projects" required min="0" placeholder="০" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                    </div>

                    <div class="form-field md:col-span-1">
                        <label>মন্তব্য</label>
                        <input type="text" name="remarks" placeholder="যেকোনো অতিরিক্ত তথ্য..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-amber-500">
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="btn-save flex-1 flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        সংরক্ষণ করুন
                    </button>
                    <button type="button" onclick="closeFormModal()" class="px-6 py-2 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400 font-semibold">বাতিল করুন</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/crud.js"></script>

    <script>
        let currentPage = 1;
        let recordsPerPage = 20;
        let allRecords = [];
        let editingId = null;
        let currentDetailId = null;

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('bn-BD');
        }

        async function loadData(page = 1) {
            try {
                currentPage = page;
                const res = await AuthManager.fetch(`${AuthManager.API_URL}/approval-memos/list?page=${page}&limit=${recordsPerPage}&search=${document.getElementById('search-input').value || ''}`);
                const data = await res.json();

                document.getElementById('total-count').innerText = data.total;
                allRecords = data.data;

                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '';

                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr class="text-center py-8"><td colspan="4" class="py-8 text-gray-500">কোনো স্মারক পাওয়া যায়নি</td></tr>';
                    return;
                }

                data.data.forEach(record => {
                    const row = document.createElement('tr');
                    row.className = 'table-row';
                    row.onclick = () => showDetailModal(record);
                    row.innerHTML = `
                        <td class="px-6 py-4 text-gray-900 font-medium">${formatDate(record.memo_date)}</td>
                        <td class="px-6 py-4 font-mono text-sm text-gray-700">${CRUDManager.escapeHtml(record.memo_number)}</td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gradient-to-br from-amber-100 to-orange-100 text-amber-700 font-bold text-sm border border-amber-200">
                                ${record.total_projects}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="event.stopPropagation(); editRecord('${record.id}')" class="px-3 py-1.5 text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors action-btn">সম্পাদনা</button>
                                <button onclick="event.stopPropagation(); deleteRecord('${record.id}')" class="px-3 py-1.5 text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition-colors action-btn">মুছুন</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });

                updatePagination(data);
            } catch (err) {
                console.error('Error loading data:', err);
                CRUDManager.showError('ডেটা লোড করতে ব্যর্থ: ' + err.message);
            }
        }

        function updatePagination(data) {
            const container = document.getElementById('pagination-container');
            container.innerHTML = '';

            if (data.pages <= 1) return;

            const nav = document.createElement('nav');
            nav.className = 'flex gap-1.5';

            for (let i = 1; i <= data.pages; i++) {
                const btn = document.createElement('button');
                btn.className = `px-3.5 py-1.5 rounded-lg font-semibold text-sm transition-all action-btn ${
                    i === currentPage
                        ? 'bg-gradient-to-r from-amber-500 to-orange-500 text-white shadow-md'
                        : 'bg-white text-gray-700 border border-gray-300 hover:border-amber-400 hover:text-amber-600'
                }`;
                btn.textContent = CRUDManager.toBengaliNumber(i);
                btn.onclick = () => loadData(i);
                nav.appendChild(btn);
            }

            container.appendChild(nav);
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('record-id').value = '';
            document.getElementById('memo-form').reset();
            document.getElementById('modal-title').innerText = 'নতুন স্মারক যোগ করুন';
            document.getElementById('form-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeFormModal() {
            document.getElementById('form-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
            editingId = null;
        }

        function showDetailModal(record) {
            currentDetailId = record.id;
            document.getElementById('dm-memo-date').innerText = formatDate(record.memo_date);
            document.getElementById('dm-memo-number').innerText = CRUDManager.escapeHtml(record.memo_number);
            document.getElementById('dm-total-projects').innerText = record.total_projects;
            document.getElementById('dm-remarks').innerText = record.remarks || 'কোনো মন্তব্য নেই';
            document.getElementById('detail-backdrop').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailModal() {
            document.getElementById('detail-backdrop').classList.remove('open');
            document.body.style.overflow = 'auto';
            currentDetailId = null;
        }

        async function editRecord(id) {
            closeDetailModal();
            const record = allRecords.find(r => r.id == id);
            if (!record) return;

            editingId = id;
            document.getElementById('record-id').value = id;
            document.getElementById('memo-form').elements['memo_date'].value = record.memo_date;
            document.getElementById('memo-form').elements['memo_number'].value = record.memo_number;
            document.getElementById('memo-form').elements['total_projects'].value = record.total_projects;
            document.getElementById('memo-form').elements['remarks'].value = record.remarks || '';
            document.getElementById('modal-title').innerText = 'স্মারক সম্পাদনা করুন';
            document.getElementById('form-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        async function deleteRecord(id) {
            if (!confirm('আপনি কি এই স্মারকটি মুছতে চান?')) return;
            try {
                await AuthManager.fetch(`${AuthManager.API_URL}/approval-memos/${id}`, { method: 'DELETE' });
                CRUDManager.showSuccess('স্মারকটি সফলভাবে মুছে ফেলা হয়েছে');
                closeDetailModal();
                loadData(currentPage);
            } catch (err) {
                CRUDManager.showError('মুছতে ব্যর্থ: ' + err.message);
            }
        }

        document.getElementById('memo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            try {
                const formData = CRUDManager.formToJSON(e.target);
                formData.total_projects = parseInt(formData.total_projects, 10) || 0;

                if (editingId) {
                    await AuthManager.fetch(`${AuthManager.API_URL}/approval-memos/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    CRUDManager.showSuccess('স্মারকটি সফলভাবে আপডেট হয়েছে');
                } else {
                    await AuthManager.fetch(`${AuthManager.API_URL}/approval-memos`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    CRUDManager.showSuccess('নতুন স্মারক সফলভাবে যোগ হয়েছে');
                }

                closeFormModal();
                loadData(currentPage);
            } catch (err) {
                CRUDManager.showError('সংরক্ষণ করতে ব্যর্থ: ' + err.message);
            } finally {
                submitBtn.disabled = false;
            }
        });

        document.getElementById('search-input').addEventListener('input', () => loadData(1));

        document.addEventListener('DOMContentLoaded', () => {
            loadData(1);
        });
    </script>
</body>
</html>
