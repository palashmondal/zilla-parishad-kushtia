name: Deploy to Live

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 1157
          script_stop: true
          script: |
            source /home/zpkushti/nodevenv/public_html/zpkushtia.org/22/bin/activate && cd /home/zpkushti/public_html/zpkushtia.org || exit 1
            echo "Current directory: $(pwd)"
            echo "Pulling latest code..."
            git pull origin main || exit 1
            echo "Installing dependencies..."
            npm install --production || exit 1
            echo "Creating upload directories..."
            mkdir -p uploads/projects uploads/documents uploads/approval-memos uploads/profiles
            echo "Running database migrations..."
            node database/migrate.js || exit 1
            echo "Restarting application..."
            ~/.npm-global/bin/pm2 restart zpkushtia 2>/dev/null || \
            ~/.local/bin/pm2 restart zpkushtia 2>/dev/null || \
            /usr/local/bin/pm2 restart zpkushtia || exit 1
            echo "✓ Deployment complete"
