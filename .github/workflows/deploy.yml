name: Deploy to Live

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 1157
          script_stop: true
          script: |
            source /home/zpkushti/nodevenv/public_html/zpkushtia.org/22/bin/activate && cd /home/zpkushti/public_html/zpkushtia.org || exit 1
            echo "Current directory: $(pwd)"
            echo "Pulling latest code..."
            git pull origin main || exit 1
            echo "Installing dependencies..."
            npm install --production || exit 1
            echo "Creating upload directories..."
            mkdir -p uploads/projects uploads/documents uploads/approval-memos uploads/profiles
            echo "Running database migrations..."
            node database/migrate.js || exit 1
            echo "Restarting application..."
            if command -v pm2 &> /dev/null; then
              pm2 restart zpkushtia || exit 1
              echo "✓ Restarted with pm2"
            else
              echo "Warning: pm2 not found, checking if process is running..."
              if [ -f ecosystem.config.js ]; then
                npm start &
                echo "✓ Started application with npm start"
              else
                echo "✓ Application restart not required or manual restart needed"
              fi
            fi
            echo "✓ Deployment complete"
